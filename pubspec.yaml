name: safechemicals
description: Aplicación móvil para acceso rápido a fichas de seguridad de productos químicos para bomberos en emergencias.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI y diseño
  cupertino_icons: ^1.0.2
  flutter_material_design_icons: ^1.1.7
  
  # Almacenamiento local
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # JSON serialization
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  
  # State management
  provider: ^6.1.0
  
  # Búsqueda y filtrado
  fuzzy: ^0.4.2
  
  # Utilidades
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/images/
  
  fonts:
    - family: SafeFont
      fonts:
        - asset: assets/fonts/SafeFont-Regular.ttf
        - asset: assets/fonts/SafeFont-Bold.ttf
          weight: 700
